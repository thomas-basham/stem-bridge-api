services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    command: sh -c "npm run prisma:migrate:deploy && npm run start"
    ports:
      - "80:4000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
